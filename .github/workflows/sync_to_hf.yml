name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  # Permette di avviare il sync anche manualmente da GitHub
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://giovannipiocirillo:$HF_TOKEN@huggingface.co/spaces/giovannipiocirillo/simple_nkm_sim
          git push --force space main
